<!-- Project List Item Template -->
<template id="project-item-template">
  <li class="sidebar-item">
    <button class="project-btn">
      <span class="mdi mdi-format-list-bulleted"></span>
      <span class="project-title-text"></span>
    </button>
    <button class="delete-project-btn btn-icon-small" aria-label="Delete Project">
      <span class="mdi mdi-close"></span>
    </button>
  </li>
</template>

<!-- Task Item Template -->
<template id="task-item-template">
  <li class="task-row">
    <div class="priority-indicator"></div>
    <button class="task-checkbox-btn" aria-label="Toggle Complete">
      <span class="mdi mdi-checkbox-blank-circle-outline"></span>
    </button>
    <div class="task-content">
      <span class="task-title"></span>
      <span class="task-due-date"></span>
    </div>
    <div class="task-actions">
      <button class="delete-task-btn btn-icon" aria-label="Delete Task">
        <span class="mdi mdi-delete-outline"></span>
      </button>
    </div>
  </li>
</template>

<!-- Project Form Template -->
<template id="project-form-template">
  <div class="modal-content">
    <h3 class="modal-title">New Project</h3>
    <form id="project-modal-form" class="modal-form">
      <div class="form-group">
        <label for="modal-project-title">Title</label>
        <input type="text" id="modal-project-title" name="title" placeholder="e.g. Work, Groceries..." required autocomplete="off">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-text cancel-btn">Cancel</button>
        <button type="submit" class="btn-primary">Create Project</button>
      </div>
    </form>
  </div>
</template>

<!-- Task Form Template -->
<template id="task-form-template">
  <div class="modal-content task-detail-content">
    <div class="modal-header">
      <h3 class="modal-title">Task Details</h3>
      <button type="button" class="btn-icon cancel-btn" aria-label="Close">
        <span class="mdi mdi-close"></span>
      </button>
    </div>
    <form id="task-modal-form" class="modal-form">
      <div class="form-body">
        <div class="form-group">
          <label for="modal-task-title">Title</label>
          <input type="text" id="modal-task-title" name="title" placeholder="What needs to be done?" required autocomplete="off">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="modal-task-date">Due Date</label>
            <input type="date" id="modal-task-date" name="dueDate">
          </div>
          <div class="form-group">
            <label for="modal-task-priority">Priority</label>
            <select id="modal-task-priority" name="priority">
              <option value="none">None</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="modal-task-status">Status</label>
            <select id="modal-task-status" name="status">
              <option value="todo">To Do</option>
              <option value="doing">Doing</option>
              <option value="done">Done</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="modal-task-desc">Description</label>
          <textarea id="modal-task-desc" name="description" rows="2" placeholder="Add some context..."></textarea>
        </div>

        <div class="form-group">
          <label>Checklist</label>
          <div id="modal-checklist-container" class="modal-checklist">
            <!-- Checklist items rendered here -->
          </div>
          <div class="add-checklist-item">
            <input type="text" id="new-checklist-item" placeholder="Add a sub-task...">
            <button type="button" id="add-subtask-btn" class="btn-icon-small">
              <span class="mdi mdi-plus"></span>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="modal-task-notes">Notes</label>
          <textarea id="modal-task-notes" name="notes" rows="3" placeholder="Extra notes..."></textarea>
        </div>
      </div>

      <div class="modal-actions">
        <button type="submit" class="btn-primary full-width">Save Task</button>
      </div>
    </form>
  </div>
</template>

<!-- Checklist Item Template (Inside Modal) -->
<template id="checklist-item-template">
  <div class="checklist-item">
    <input type="checkbox" class="subtask-checkbox">
    <span class="subtask-text"></span>
    <button type="button" class="delete-subtask-btn btn-icon-small" aria-label="Delete Subtask">
      <span class="mdi mdi-trash-can-outline"></span>
    </button>
  </div>
</template>
